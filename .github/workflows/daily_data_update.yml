name: Daily Data Update

on:
  schedule:
    # Run daily at 11:30 PM IST (6:00 PM UTC)
    - cron: '30 18 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Debug secrets
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        MONGO_DB_NAME: ${{ secrets.MONGO_DB_NAME }}
        MONGO_COLLECTION_NAME: ${{ secrets.MONGO_COLLECTION_NAME }}
        
    - name: Run query script
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        MONGO_DB_NAME: ${{ secrets.MONGO_DB_NAME }}
        MONGO_COLLECTION_NAME: ${{ secrets.MONGO_COLLECTION_NAME }}
      run: python query_by_date.py
      
    - name: Check if data file was generated
      run: |
        echo "Checking if data_by_date.json was generated..."
        if [ -f "data_by_date.json" ]; then
          echo "✅ data_by_date.json exists"
          echo "File size: $(wc -c < data_by_date.json) bytes"
          echo "First few lines:"
          head -10 data_by_date.json
        else
          echo "❌ data_by_date.json was not generated"
          exit 1
        fi
      
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data_by_date.json
        
        # Check if there are changes to commit
        echo "Checking for changes..."
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          echo "Changes detected, committing..."
          git commit -m "Update daily data - $(date '+%Y-%m-%d %H:%M:%S')"
          git push
          echo "✅ Changes committed and pushed successfully"
        fi